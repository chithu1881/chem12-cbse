<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math12 CBSE | Quick Revision</title>
<style>
:root{--primary:#6c63ff;--secondary:#ff6584;--accent:#43e97b;--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--text:#e0e0e0;--muted:#888;--border:#2a2a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 50%,#16213e 100%);border-bottom:1px solid var(--border);padding:20px;text-align:center;position:sticky;top:0;z-index:100}
header h1{font-size:1.8rem;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);font-size:.85rem;margin-top:4px}
.nav-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.nav-pills button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;transition:all .2s}
.nav-pills button.active,.nav-pills button:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.container{max-width:1100px;margin:0 auto;padding:20px}
.page{display:none}.page.active{display:block}

/* HOME */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:700;color:var(--primary)}
.stat-card .lbl{font-size:.75rem;color:var(--muted);margin-top:4px}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.ch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary))}
.ch-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 24px rgba(108,99,255,.2)}
.ch-card .ch-num{font-size:.7rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.ch-card h3{font-size:.95rem;color:#fff;margin-bottom:8px}
.ch-card .tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.3);color:var(--primary);padding:2px 8px;border-radius:10px;font-size:.7rem}
.tag.hot{background:rgba(255,101,132,.15);border-color:rgba(255,101,132,.3);color:var(--secondary)}
.hot-topics{margin-top:10px;font-size:.78rem;color:var(--muted)}
.hot-topics span{color:var(--accent)}

/* CHAPTER DETAIL */
.back-btn{background:none;border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;gap:6px;font-size:.85rem}
.back-btn:hover{border-color:var(--primary);color:var(--primary)}
.ch-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.ch-header h2{font-size:1.3rem;color:#fff;margin-bottom:8px}
.ch-header .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:.8rem;color:var(--muted)}
.tab-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:all .2s}
.tab-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tab-content{display:none}.tab-content.active{display:block}

/* CONCEPTS */
.concept-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.concept-block h4{color:var(--primary);font-size:.95rem;margin-bottom:8px}
.concept-block p,.concept-block li{font-size:.88rem;line-height:1.7;color:var(--text)}
.concept-block ul{padding-left:20px}

/* MNEMONICS */
.mnemonic-card{background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(255,101,132,.05));border:1px solid rgba(108,99,255,.25);border-radius:12px;padding:16px;margin-bottom:12px}
.mnemonic-card .mtext{font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:8px}
.mnemonic-card .mexp{font-size:.85rem;color:var(--text);line-height:1.6}

/* FORMULAS */
.formula-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.formula-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px}
.formula-card .f{font-family:'Courier New',monospace;font-size:.92rem;color:var(--accent);margin-bottom:6px;word-break:break-all}
.formula-card .fl{font-size:.78rem;color:var(--muted)}

/* PYQ */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filters select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:.82rem;cursor:pointer}
.pyq-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.pyq-meta{display:flex;gap:10px;margin-bottom:8px;font-size:.75rem}
.pyq-meta .year{color:var(--secondary);font-weight:600}
.pyq-meta .marks{color:var(--muted)}
.pyq-q{font-size:.88rem;line-height:1.6;margin-bottom:10px}
.ans-toggle{background:none;border:1px solid var(--primary);color:var(--primary);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.78rem}
.ans-toggle:hover{background:var(--primary);color:#fff}
.ans-box{background:rgba(67,233,123,.05);border:1px solid rgba(67,233,123,.2);border-radius:8px;padding:12px;margin-top:10px;font-size:.85rem;line-height:1.6;display:none}
.ans-box.show{display:block}

/* FLASHCARDS */
.fc-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.fc-controls button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.82rem}
.fc-controls button:hover,.fc-controls button.on{background:var(--primary);border-color:var(--primary);color:#fff}
.fc-progress{color:var(--muted);font-size:.82rem;margin-left:auto}
.fc-wrap{perspective:1000px;margin-bottom:14px}
.fc{width:100%;min-height:200px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;min-height:200px;backface-visibility:hidden;border-radius:14px;padding:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.fc-front{background:linear-gradient(135deg,var(--card),var(--card2));border:2px solid var(--primary)}
.fc-back{background:linear-gradient(135deg,rgba(67,233,123,.1),rgba(108,99,255,.1));border:2px solid var(--accent);transform:rotateY(180deg)}
.fc-front .q{font-size:1rem;color:#fff;line-height:1.5}
.fc-back .a{font-size:.95rem;color:var(--accent);font-weight:600;margin-bottom:8px}
.fc-back .ex{font-size:.8rem;color:var(--muted);margin-top:6px}
.fc-nav{display:flex;gap:10px;justify-content:center}
.fc-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:8px;cursor:pointer}
.fc-nav button:hover{background:var(--primary);border-color:var(--primary);color:#fff}

/* PYQ PAGE */
.pyq-search{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.pyq-search input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:.85rem;flex:1;min-width:160px}
.pyq-search select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.82rem}

/* SYLLABUS */
.unit-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.unit-block h3{color:var(--primary);font-size:1rem;margin-bottom:12px;display:flex;justify-content:space-between}
.unit-block h3 span{color:var(--secondary);font-size:.85rem}
.unit-block ul{list-style:none;padding:0}
.unit-block ul li{padding:6px 0;border-bottom:1px solid var(--border);font-size:.85rem;display:flex;justify-content:space-between}
.unit-block ul li:last-child{border-bottom:none}
.unit-block ul li span{color:var(--muted);font-size:.78rem}

@media(max-width:600px){header h1{font-size:1.3rem}.ch-card h3{font-size:.85rem}.fc-face{padding:18px}}
</style>
</head>
<body>
<header>
  <h1>📐 Math12 CBSE | Quick Revision</h1>
  <p>Class 12 Mathematics — CBSE 2026 | All Chapters | Concepts · Mnemonics · Formulas · PYQ · Flashcards</p>
  <nav class="nav-pills">
    <button class="active" onclick="showPage('home',this)">🏠 Chapters</button>
    <button onclick="showPage('pyqAll',this)">📋 All PYQ</button>
    <button onclick="showPage('syllabus',this)">📚 Syllabus</button>
  </nav>
</header>
<div class="container">

<!-- HOME -->
<div id="home" class="page active">
  <div class="stats-grid">
    <div class="stat-card"><div class="num">13</div><div class="lbl">Chapters</div></div>
    <div class="stat-card"><div class="num">80</div><div class="lbl">Marks (Theory)</div></div>
    <div class="stat-card"><div class="num">20</div><div class="lbl">Marks (IA)</div></div>
    <div class="stat-card"><div class="num">100+</div><div class="lbl">PYQ</div></div>
    <div class="stat-card"><div class="num">100+</div><div class="lbl">Flashcards</div></div>
  </div>
  <div class="chapter-grid" id="chapterGrid"></div>
</div>

<!-- CHAPTER DETAIL -->
<div id="chapterDetail" class="page">
  <button class="back-btn" onclick="showPage('home',null)">← Back to Chapters</button>
  <div class="ch-header" id="chHeader"></div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="tabContents"></div>
</div>

<!-- ALL PYQ -->
<div id="pyqAll" class="page">
  <h2 style="margin-bottom:14px;color:var(--primary)">All Previous Year Questions</h2>
  <div class="pyq-search">
    <input id="pyqSearch" type="text" placeholder="Search questions..." oninput="renderAllPYQ()">
    <select id="pyqYear" onchange="renderAllPYQ()"><option value="">All Years</option></select>
    <select id="pyqMarks" onchange="renderAllPYQ()"><option value="">All Marks</option><option value="1">1M</option><option value="2">2M</option><option value="3">3M</option><option value="4">4M</option><option value="5">5M</option></select>
    <select id="pyqChapter" onchange="renderAllPYQ()"><option value="">All Chapters</option></select>
  </div>
  <div id="pyqAllList"></div>
</div>

<!-- SYLLABUS -->
<div id="syllabus" class="page">
  <h2 style="margin-bottom:14px;color:var(--primary)">CBSE 2026 Mathematics Syllabus</h2>
  <div id="syllabusContent"></div>
</div>

</div>
<script>
const chapters = [
  {
    id:1, title:"Relations and Functions", unit:"I", marks:8,
    tags:["8 marks","relations","functions","hot🔥"],
    hotTopics:["Types of relations","Types of functions","Composition","Inverse"],
    concepts:[
      {h:"Types of Relations",p:"<ul><li><b>Empty Relation:</b> R = φ (no element related)</li><li><b>Universal Relation:</b> R = A×A (every element related)</li><li><b>Reflexive:</b> (a,a) ∈ R ∀ a ∈ A</li><li><b>Symmetric:</b> (a,b) ∈ R ⟹ (b,a) ∈ R</li><li><b>Transitive:</b> (a,b),(b,c) ∈ R ⟹ (a,c) ∈ R</li><li><b>Equivalence:</b> Reflexive + Symmetric + Transitive</li></ul>"},
      {h:"Types of Functions",p:"<ul><li><b>One-one (Injective):</b> f(a)=f(b) ⟹ a=b. Different inputs → different outputs</li><li><b>Onto (Surjective):</b> Range = Co-domain. Every y has a pre-image</li><li><b>Bijective:</b> Both one-one and onto. Inverse exists</li><li><b>Many-one:</b> Two elements map to same output</li></ul>"},
      {h:"Composition of Functions",p:"(gof)(x) = g(f(x)). Apply f first, then g. <br>Properties: gof is not necessarily = fog. If f,g are bijective then gof is bijective. (gof)⁻¹ = f⁻¹og⁻¹"},
      {h:"Invertible Functions",p:"A function is invertible iff it is bijective. If f:A→B is bijective, then f⁻¹:B→A exists. fof⁻¹ = I_B and f⁻¹of = I_A."},
      {h:"Binary Operations",p:"A binary operation * on A: a*b ∈ A (closure). Commutative: a*b=b*a. Associative: (a*b)*c=a*(b*c). Identity element e: a*e=e*a=a. Inverse of a: a*b=b*a=e."}
    ],
    mnemonics:[
      {m:"RST = Equivalence",exp:"Reflexive + Symmetric + Transitive = Equivalence Relation. Remember: 'RST' like 'Rust' on metal — all three layers together make it complete."},
      {m:"OOO = Bijective",exp:"One-One + Onto = bijective (One more O = bijective). If a function is bijective it has an inverse."},
      {m:"f first, g second in gof",exp:"In gof(x) = g(f(x)) — read right to left: f is applied first, then g. 'Go (gof) — f runs, then g chases.'"},
      {m:"CAIS for Binary Ops",exp:"Closure, Associative, Identity, Inverse — the 4 properties of a group operation. 'CAIS = Company Always Is Safe.'"}
    ],
    formulas:[
      {f:"(gof)(x) = g(f(x))",label:"Composition of g and f"},
      {f:"(gof)⁻¹ = f⁻¹og⁻¹",label:"Inverse of composition"},
      {f:"n(A×A) = n²",label:"Number of relations on A with n elements = 2^(n²)"},
      {f:"fof⁻¹ = I_B, f⁻¹of = I_A",label:"Inverse function identity"},
      {f:"a*e = e*a = a",label:"Identity element for binary op"}
    ],
    pyqs:[
      {y:"2024",m:2,q:"Check whether the relation R in ℝ defined by R = {(a,b): a ≤ b³} is reflexive, symmetric or transitive.",ans:"Not reflexive (½ ≤ (½)³ is false), not symmetric, not transitive. None of the three."},
      {y:"2023",m:2,q:"Show that the relation R in the set {1,2,3} given by R={(1,2),(2,1)} is symmetric but neither reflexive nor transitive.",ans:"Symmetric: (1,2)∈R ⟹ (2,1)∈R ✓. Not reflexive: (1,1)∉R. Not transitive: (1,2),(2,1)∈R but (1,1)∉R."},
      {y:"2023",m:2,q:"If f(x) = (4x+3)/(6x-4), x ≠ 2/3, show that fof(x) = x.",ans:"Compute fof(x) = f(f(x)) = (4·(4x+3)/(6x-4)+3)/(6·(4x+3)/(6x-4)-4). Simplify numerator and denominator to get x."},
      {y:"2022",m:1,q:"A function f: ℝ→ℝ defined as f(x)=x⁴ is (A) One-one onto (B) One-one into (C) Many-one onto (D) Many-one into",ans:"(D) Many-one into. f(-1)=f(1)=1 so many-one. Range=[0,∞)≠ℝ so into (not onto)."},
      {y:"2020",m:4,q:"Let f:N→R be defined by f(n)=(2n-1)/2 and g:Q→R by g(x)=x+2. Find fog.",ans:"fog(x) = f(g(x)) = f(x+2) = (2(x+2)-1)/2 = (2x+3)/2."}
    ],
    flashcards:[
      {q:"What is an equivalence relation?",a:"Reflexive + Symmetric + Transitive",extra:"Ex: equality (=) on integers"},
      {q:"Difference between one-one and onto",a:"One-one: f(a)=f(b)⟹a=b. Onto: Range=Codomain",extra:"Bijective = both"},
      {q:"What is gof(x)?",a:"g(f(x)) — apply f first, then g",extra:"Read composition right to left"},
      {q:"When does inverse of a function exist?",a:"Only when f is bijective (one-one and onto)",extra:"fof⁻¹ = I, f⁻¹of = I"},
      {q:"Identity element for addition on ℝ",a:"0 (zero), since a+0=a",extra:"For multiplication: 1"},
      {q:"What does RST stand for in relations?",a:"Reflexive, Symmetric, Transitive — conditions for equivalence",extra:"All three needed"}
    ]
  },
  {
    id:2, title:"Inverse Trigonometric Functions", unit:"I", marks:8,
    tags:["8 marks","ITF","principal value","hot🔥"],
    hotTopics:["Principal value branch","Properties/identities","Simplification"],
    concepts:[
      {h:"Principal Value Branches",p:"<ul><li>sin⁻¹: domain [-1,1], range [-π/2, π/2]</li><li>cos⁻¹: domain [-1,1], range [0, π]</li><li>tan⁻¹: domain ℝ, range (-π/2, π/2)</li><li>cosec⁻¹: domain ℝ-(-1,1), range [-π/2,π/2]-{0}</li><li>sec⁻¹: domain ℝ-(-1,1), range [0,π]-{π/2}</li><li>cot⁻¹: domain ℝ, range (0, π)</li></ul>"},
      {h:"Key Properties",p:"<ul><li>sin⁻¹(sin x) = x if x∈[-π/2,π/2]</li><li>sin(sin⁻¹x) = x if x∈[-1,1]</li><li>sin⁻¹x + cos⁻¹x = π/2</li><li>tan⁻¹x + cot⁻¹x = π/2</li><li>sec⁻¹x + cosec⁻¹x = π/2</li></ul>"},
      {h:"Important Identities",p:"<ul><li>tan⁻¹x + tan⁻¹y = tan⁻¹[(x+y)/(1-xy)], xy&lt;1</li><li>tan⁻¹x - tan⁻¹y = tan⁻¹[(x-y)/(1+xy)], xy&gt;-1</li><li>2tan⁻¹x = tan⁻¹(2x/(1-x²)) = sin⁻¹(2x/(1+x²)) = cos⁻¹((1-x²)/(1+x²))</li><li>sin⁻¹(-x) = -sin⁻¹x; cos⁻¹(-x) = π - cos⁻¹x</li></ul>"}
    ],
    mnemonics:[
      {m:"SC range: Sine Smallest, Cosine Completes",exp:"sin⁻¹ range is [-π/2,π/2] (smallest symmetric). cos⁻¹ range is [0,π] (completes 0 to π). Sine is Shy (-π/2 to π/2). Cosine is Calm (0 to π)."},
      {m:"SC + TC + SC = π/2 (complementary pairs)",exp:"sin⁻¹x + cos⁻¹x = π/2. tan⁻¹x + cot⁻¹x = π/2. sec⁻¹x + cosec⁻¹x = π/2. Complementary partners always sum to π/2."},
      {m:"tan⁻¹ addition: TOP = x+y, BOTTOM = 1-xy",exp:"tan⁻¹x + tan⁻¹y = tan⁻¹[(x+y)/(1-xy)]. 'Top adds, Bottom subtracts product.' Valid when xy < 1."},
      {m:"Odd/Even: sine odd, cosine even (π-x)",exp:"sin⁻¹(-x) = -sin⁻¹x (odd). cos⁻¹(-x) = π - cos⁻¹x (not simply even — adds π). 'Sine is Odd, Cosine adds a π.'"}
    ],
    formulas:[
      {f:"sin⁻¹x + cos⁻¹x = π/2",label:"Complementary identity"},
      {f:"tan⁻¹x + tan⁻¹y = tan⁻¹[(x+y)/(1-xy)]",label:"Sum formula (xy<1)"},
      {f:"2tan⁻¹x = sin⁻¹[2x/(1+x²)]",label:"Double angle ITF"},
      {f:"tan⁻¹x + cot⁻¹x = π/2",label:"Complementary pair"},
      {f:"sin⁻¹(-x) = -sin⁻¹x",label:"Odd property"}
    ],
    pyqs:[
      {y:"2024",m:2,q:"Find the principal value of tan⁻¹(-1) + cos⁻¹(-1/√2).",ans:"tan⁻¹(-1) = -π/4. cos⁻¹(-1/√2) = 3π/4. Sum = -π/4 + 3π/4 = 2π/4 = π/2."},
      {y:"2023",m:2,q:"Write the value of tan⁻¹[2sin(2cos⁻¹(√3/2))].",ans:"cos⁻¹(√3/2)=π/6. 2cos⁻¹(√3/2)=π/3. sin(π/3)=√3/2. 2sin(π/3)=√3. tan⁻¹(√3)=π/3."},
      {y:"2022",m:3,q:"Prove that tan⁻¹(1/2) + tan⁻¹(1/3) = π/4.",ans:"Use sum formula: tan⁻¹[(1/2+1/3)/(1-1/2·1/3)] = tan⁻¹[(5/6)/(5/6)] = tan⁻¹(1) = π/4. ✓"},
      {y:"2020",m:2,q:"Simplify: sin⁻¹(sin(2π/3)).",ans:"2π/3 is not in [-π/2,π/2]. sin(2π/3)=sin(π/3). So sin⁻¹(sin(2π/3))=π/3."}
    ],
    flashcards:[
      {q:"Range of cos⁻¹x",a:"[0, π]",extra:"Domain: [-1, 1]"},
      {q:"Value of sin⁻¹(1)",a:"π/2",extra:"sin(π/2) = 1"},
      {q:"sin⁻¹x + cos⁻¹x = ?",a:"π/2",extra:"Complementary identity — always!"},
      {q:"tan⁻¹(1)",a:"π/4",extra:"tan(π/4)=1"},
      {q:"cos⁻¹(-1/2)",a:"2π/3",extra:"cos(2π/3)=-1/2"},
      {q:"2tan⁻¹(1/2) simplified",a:"tan⁻¹(4/3)",extra:"Use 2tan⁻¹x = tan⁻¹(2x/(1-x²))"}
    ]
  },
  {
    id:3, title:"Matrices", unit:"II", marks:10,
    tags:["10 marks","operations","transpose","hot🔥"],
    hotTopics:["Matrix operations","Transpose properties","Symmetric & Skew-symmetric"],
    concepts:[
      {h:"Types of Matrices",p:"<ul><li><b>Row/Column:</b> 1×n or m×1</li><li><b>Square:</b> m = n</li><li><b>Diagonal:</b> non-diagonal elements = 0</li><li><b>Scalar:</b> Diagonal with equal elements</li><li><b>Identity (I):</b> Diagonal with 1s</li><li><b>Zero Matrix:</b> All elements 0</li><li><b>Symmetric:</b> A = Aᵀ</li><li><b>Skew-symmetric:</b> Aᵀ = -A (diagonal = 0)</li></ul>"},
      {h:"Matrix Operations",p:"<ul><li>Addition/Subtraction: same order matrices, element-wise</li><li>Scalar multiplication: kA — multiply every element by k</li><li>Matrix multiplication: A(m×n)·B(n×p) = C(m×p)</li><li>AB ≠ BA in general (not commutative)</li><li>A(BC) = (AB)C (associative)</li><li>A(B+C) = AB+AC (distributive)</li></ul>"},
      {h:"Transpose Properties",p:"<ul><li>(Aᵀ)ᵀ = A</li><li>(A+B)ᵀ = Aᵀ+Bᵀ</li><li>(kA)ᵀ = kAᵀ</li><li>(AB)ᵀ = BᵀAᵀ (reversal law)</li></ul>"},

      {h:"Second Order Derivatives & Theorems",p:"d²y/dx² = d/dx(dy/dx)<br><b>Rolle's Theorem:</b> f continuous on [a,b], differentiable on (a,b), f(a)=f(b) → ∃c∈(a,b): f'(c)=0<br><b>LMVT:</b> f continuous on [a,b], differentiable on (a,b) → ∃c: f'(c)=[f(b)-f(a)]/(b-a)"}

      {h:"Types of Solutions",p:"<ul><li><b>Unique optimal:</b> Z has max/min at one corner point</li><li><b>Multiple optimal:</b> Z has max/min along a whole edge</li><li><b>Unbounded:</b> Feasible region extends to infinity, Z may or may not have max/min</li><li><b>Infeasible:</b> No feasible region (contradictory constraints)</li></ul>"}

      {h:"Conditional Probability",p:"P(A|B) = P(A∩B)/P(B), where P(B)>0.<br>Multiplication theorem: P(A∩B) = P(A)·P(B|A) = P(B)·P(A|B).<br>Independent events: P(A∩B) = P(A)·P(B), P(A|B) = P(A)."},
      {h:"Total Probability & Bayes' Theorem",p:"If B₁,B₂,...,Bₙ partition sample space:<br>P(A) = Σ P(Bᵢ)·P(A|Bᵢ) (Total Probability)<br>P(Bᵢ|A) = P(Bᵢ)·P(A|Bᵢ)/ΣP(Bⱼ)·P(A|Bⱼ) (Bayes' Theorem)"},
      {h:"Random Variable and Distribution",p:"Random variable X: function from sample space to ℝ.<br>Probability distribution: list of values x with P(X=x).<br>ΣP(xᵢ)=1 always.<br>Mean E(X) = Σxᵢ·P(xᵢ)<br>Variance = Σxᵢ²P(xᵢ) - [E(X)]²"},
      {h:"Binomial Distribution",p:"X~B(n,p): n independent trials, probability of success p.<br>P(X=r) = ⁿCᵣ·pʳ·qⁿ⁻ʳ where q=1-p.<br>Mean = np, Variance = npq, SD = √(npq)."}
    ],
    mnemonics:[
      {m:"P(A|B) = P(A∩B)/P(B) — 'Given B, intersection over B'",exp:"Conditional probability: P(A given B) = P(both A and B happen) divided by P(B). 'Condition cuts the sample space to B, find A within it.'"},
      {m:"Bayes: Prior × Likelihood / Total — PAST to PRESENT",exp:"Bayes updates probability using new evidence. Prior P(Bᵢ) updated by P(A|Bᵢ) gives posterior P(Bᵢ|A). 'Bayesian thinking: update beliefs with evidence.'"},
      {m:"Binomial: ⁿCᵣ pʳ qⁿ⁻ʳ — Choose, powers, remaining",exp:"P(X=r) = ⁿCᵣ (choose r successes) × pʳ (success probability r times) × qⁿ⁻ʳ (failure probability for remaining). Mean=np, Var=npq."},
      {m:"Independent ⟺ P(A∩B) = P(A)·P(B)",exp:"Events are independent if knowing one doesn't affect the other. Test: P(A∩B)=P(A)·P(B). 'Independent = product rule applies.' Don't confuse with mutually exclusive (P(A∩B)=0)."}
    ],
    formulas:[
      {f:"P(A|B) = P(A∩B)/P(B)",label:"Conditional probability"},
      {f:"P(A) = ΣP(Bᵢ)·P(A|Bᵢ)",label:"Total probability theorem"},
      {f:"P(Bᵢ|A) = P(Bᵢ)P(A|Bᵢ)/ΣP(Bⱼ)P(A|Bⱼ)",label:"Bayes' theorem"},
      {f:"P(X=r) = ⁿCᵣ·pʳ·(1-p)ⁿ⁻ʳ",label:"Binomial distribution"},
      {f:"Mean = np, Var = npq",label:"Binomial mean and variance"},
      {f:"E(X) = Σxᵢ·P(xᵢ)",label:"Mean of random variable"}
    ],
    pyqs:[
      {y:"2024",m:4,q:"A bag contains 4 red and 4 black balls. A ball is drawn at random, its colour noted and it is not replaced. Another ball is drawn. Find probability that second ball is red.",ans:"P(2nd red) = P(1st red)P(2nd red|1st red) + P(1st black)P(2nd red|1st black) = (4/8)(3/7)+(4/8)(4/7) = 12/56+16/56 = 28/56 = 1/2."},
      {y:"2023",m:4,q:"A man is known to speak truth 3 out of 4 times. He throws a die and reports it is six. Find probability that it is actually six.",ans:"P(6)=1/6, P(not 6)=5/6. P(reports 6|6)=3/4. P(reports 6|not 6)=1/4. Bayes: P(6|reports 6)=(1/6·3/4)/[(1/6·3/4)+(5/6·1/4)]=(3/24)/[(3/24)+(5/24)]=3/8."},
      {y:"2022",m:3,q:"If X is a random variable with P(X=0)=k, P(X=1)=3k, P(X=2)=6k, find k and E(X).",ans:"ΣP=k+3k+6k=10k=1 → k=1/10. E(X)=0·(1/10)+1·(3/10)+2·(6/10)=0+3/10+12/10=15/10=3/2."},
      {y:"2020",m:4,q:"Suppose X has binomial distribution B(6,1/2). Show that X=3 is the most likely outcome.",ans:"P(X=r)=⁶Cᵣ(1/2)⁶. P(X=3)=⁶C₃/64=20/64=5/16. Compare with P(X=2)=15/64 and P(X=4)=15/64. P(X=3) is maximum. Mode=3."}
    ],
    flashcards:[
      {q:"Formula for P(A|B)",a:"P(A∩B)/P(B)",extra:"Only defined when P(B) > 0"},
      {q:"Mean of binomial distribution B(n,p)",a:"np",extra:"Variance = npq, where q = 1-p"},
      {q:"Independent events condition",a:"P(A∩B) = P(A)·P(B)",extra:"Not the same as mutually exclusive!"},
      {q:"P(X=r) in binomial distribution",a:"ⁿCᵣ·pʳ·(1-p)ⁿ⁻ʳ",extra:"r successes in n independent trials"},
      {q:"What does Bayes theorem calculate?",a:"Posterior probability P(Bᵢ|A) — probability of hypothesis given evidence",extra:"Updates prior with likelihood"},
      {q:"ΣP(xᵢ) for any probability distribution",a:"= 1 (sum of all probabilities must be 1)",extra:"Key check in distribution problems"}
    ]
  }
];

let currentChapter=null, currentTab='concepts', currentCards=[], fcIndex=0, allPYQ=[];

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-pills button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(id==='pyqAll')renderAllPYQ();
  if(id==='syllabus')renderSyllabus();
}

function renderChapterGrid(){
  const g=document.getElementById('chapterGrid');
  g.innerHTML=chapters.map(c=>`
    <div class="ch-card" onclick="openChapter(${c.id})">
      <div class="ch-num">Chapter ${c.id} · Unit ${c.unit} · ${c.marks}M</div>
      <h3>${c.title}</h3>
      <div class="tags">${c.tags.map(t=>`<span class="tag ${t.includes('🔥')?'hot':''}">${t}</span>`).join('')}</div>
      <div class="hot-topics">🎯 <span>${c.hotTopics.join(' · ')}</span></div>
    </div>`).join('');
}

function openChapter(id){
  currentChapter=chapters.find(c=>c.id===id);
  const c=currentChapter;
  document.getElementById('chHeader').innerHTML=`
    <h2>Ch${c.id}: ${c.title}</h2>
    <div class="meta">
      <span>Unit ${c.unit}</span><span>${c.marks} Marks</span>
      <span>${c.hotTopics.join(' | ')}</span>
    </div>`;
  const tabs=['concepts','mnemonics','formulas','pyq','flashcards'];
  const labels=['📖 Concepts','💡 Mnemonics','📐 Formulas','📋 PYQ','🃏 Flashcards'];
  document.getElementById('tabBar').innerHTML=tabs.map((t,i)=>
    `<button class="tab-btn ${t==='concepts'?'active':''}" onclick="switchTab('${t}',this)">${labels[i]}</button>`).join('');
  switchTab('concepts',document.querySelector('.tab-btn'));
  showPage('chapterDetail',null);
}

function switchTab(tab, btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const c=currentChapter;
  let html='';
  if(tab==='concepts'){
    html=c.concepts.map(x=>`<div class="concept-block"><h4>${x.h}</h4><p>${x.p}</p></div>`).join('');
  } else if(tab==='mnemonics'){
    html=c.mnemonics.map(x=>`<div class="mnemonic-card"><div class="mtext">💡 ${x.m}</div><div class="mexp">${x.exp}</div></div>`).join('');
  } else if(tab==='formulas'){
    html=`<div class="formula-grid">${c.formulas.map(x=>`<div class="formula-card"><div class="f">${x.f}</div><div class="fl">${x.label}</div></div>`).join('')}</div>`;
  } else if(tab==='pyq'){
    html=`<div class="filters">
      <select onchange="filterPYQ(this)"><option value="">All Years</option>${[...new Set(c.pyqs.map(p=>p.y))].map(y=>`<option>${y}</option>`).join('')}</select>
      <select onchange="filterPYQ(this)"><option value="">All Marks</option>${[...new Set(c.pyqs.map(p=>p.m))].sort().map(m=>`<option value="${m}">${m}M</option>`).join('')}</select>
    </div><div id="pyqList">${renderPYQCards(c.pyqs)}</div>`;
  } else if(tab==='flashcards'){
    currentCards=[...c.flashcards]; fcIndex=0;
    html=`<div class="fc-controls">
      <button onclick="prevCard()">← Prev</button>
      <button onclick="nextCard()">Next →</button>
      <button onclick="shuffleCards(this)" id="shuffleBtn">🔀 Shuffle</button>
      <span class="fc-progress" id="fcProg">1 / ${currentCards.length}</span>
    </div>
    <div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
      <div class="fc-face fc-front"><div class="q" id="fcQ"></div><div style="color:var(--muted);font-size:.75rem;margin-top:12px">Click to flip</div></div>
      <div class="fc-face fc-back"><div class="a" id="fcA"></div><div class="ex" id="fcEx"></div></div>
    </div></div>`;
    setTimeout(()=>updateCard(),10);
  }
  document.getElementById('tabContents').innerHTML=`<div class="tab-content active">${html}</div>`;
  if(tab==='flashcards')updateCard();
}

function renderPYQCards(pyqs){
  return pyqs.map((p,i)=>`
    <div class="pyq-card">
      <div class="pyq-meta"><span class="year">${p.y}</span><span class="marks">${p.m} marks</span></div>
      <div class="pyq-q">${p.q}</div>
      <button class="ans-toggle" onclick="toggleAns(this,'ans${i}')">Show Answer</button>
      <div class="ans-box" id="ans${i}">${p.ans}</div>
    </div>`).join('');
}

function filterPYQ(){}
function toggleAns(btn,id){
  const box=document.getElementById(id);
  box.classList.toggle('show');
  btn.textContent=box.classList.contains('show')?'Hide Answer':'Show Answer';
}

function updateCard(){
  if(!currentCards.length)return;
  const card=currentCards[fcIndex];
  const fc=document.getElementById('fc');
  if(!fc)return;
  if(fc.classList.contains('flipped'))fc.classList.remove('flipped');
  document.getElementById('fcQ').textContent=card.q;
  document.getElementById('fcA').textContent=card.a;
  document.getElementById('fcEx').textContent=card.extra||'';
  document.getElementById('fcProg').textContent=`${fcIndex+1} / ${currentCards.length}`;
}
function flipCard(){document.getElementById('fc').classList.toggle('flipped')}
function nextCard(){fcIndex=(fcIndex+1)%currentCards.length;updateCard()}
function prevCard(){fcIndex=(fcIndex-1+currentCards.length)%currentCards.length;updateCard()}
function shuffleCards(btn){
  currentCards=[...currentCards].sort(()=>Math.random()-.5);
  fcIndex=0; updateCard();
  btn.classList.toggle('on');
}

function renderAllPYQ(){
  const search=document.getElementById('pyqSearch').value.toLowerCase();
  const year=document.getElementById('pyqYear').value;
  const marks=document.getElementById('pyqMarks').value;
  const ch=document.getElementById('pyqChapter').value;
  let results=[];
  chapters.forEach(c=>{
    c.pyqs.forEach((p,i)=>{
      if((year===''||p.y===year)&&(marks===''||p.m==marks)&&(ch===''||c.title===ch)&&(search===''||p.q.toLowerCase().includes(search))){
        results.push({...p,chTitle:c.title,idx:i+c.id*100});
      }
    });
  });
  document.getElementById('pyqAllList').innerHTML=results.length?results.map(p=>`
    <div class="pyq-card">
      <div class="pyq-meta"><span class="year">${p.y}</span><span class="marks">${p.m}M</span><span style="color:var(--primary)">${p.chTitle}</span></div>
      <div class="pyq-q">${p.q}</div>
      <button class="ans-toggle" onclick="toggleAns(this,'allAns${p.idx}')">Show Answer</button>
      <div class="ans-box" id="allAns${p.idx}">${p.ans}</div>
    </div>`).join(''):'<p style="color:var(--muted)">No questions found.</p>';
}

function initPYQFilters(){
  const years=[...new Set(chapters.flatMap(c=>c.pyqs.map(p=>p.y)))].sort().reverse();
  document.getElementById('pyqYear').innerHTML='<option value="">All Years</option>'+years.map(y=>`<option>${y}</option>`).join('');
  document.getElementById('pyqChapter').innerHTML='<option value="">All Chapters</option>'+chapters.map(c=>`<option>${c.title}</option>`).join('');
}

function renderSyllabus(){
  const units=[
    {name:"Unit I: Relations and Functions",marks:8,chs:[1,2]},
    {name:"Unit II: Algebra",marks:10,chs:[3,4]},
    {name:"Unit III: Calculus",marks:35,chs:[5,6,7,8,9]},
    {name:"Unit IV: Vectors & 3D Geometry",marks:14,chs:[10,11]},
    {name:"Unit V: Linear Programming",marks:5,chs:[12]},
    {name:"Unit VI: Probability",marks:8,chs:[13]}
  ];
  document.getElementById('syllabusContent').innerHTML=units.map(u=>`
    <div class="unit-block">
      <h3>${u.name} <span>${u.marks} Marks</span></h3>
      <ul>${u.chs.map(id=>{const c=chapters.find(x=>x.id===id);return `<li>${c.title}<span>${c.marks}M</span></li>`;}).join('')}</ul>
    </div>`).join('');
}

renderChapterGrid();
initPYQFilters();
</script>
</body>
</html>
